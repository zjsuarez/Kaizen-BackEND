spring.profiles.active=local
spring.application.name=KaizenAPI
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql: true
spring.datasource.url =${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration_ms=${JWT_EXPIRATION_MS}

# DigitalOcean Spaces (S3 compatible)
do.spaces.endpoint=${DO_SPACES_ENDPOINT}
do.spaces.region=${DO_SPACES_REGION}
do.spaces.bucket=${DO_SPACES_BUCKET}
do.spaces.access-key=${DO_SPACES_ACCESS_KEY}
do.spaces.secret-key=${DO_SPACES_SECRET_KEY}

# Google
google.client.id=${GOOGLE_CLIENT_ID}

# Email – Gmail SMTP (App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true